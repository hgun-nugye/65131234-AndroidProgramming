# Project-wide Gradle settings.
org.gradle.jvmargs=-Xmx2048m -Dfile.encoding=UTF-8
android.useAndroidX=true
android.nonTransitiveRClass=true

# Explicitly set the JDK home and search paths
#org.gradle.java.home=C\:/Users/PC/jdk-24_windows-x64_bin/jdk-24.0.1
#org.gradle.java.installations.paths=C\:/Users/PC/jdk-24_windows-x64_bin/jdk-24.0.1

# Disable auto-detection to prevent Gradle from picking up broken JREs from extensions
org.gradle.java.installations.auto-detect=false
org.gradle.java.installations.auto-download=false
